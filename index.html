<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScreenVoice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="lobby">
    <div class="lobby-card">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#5865F2"/>
          <path d="M16 18h16v4H16zM16 24h16v4H16zM16 30h10v4H16z" fill="#fff"/>
        </svg>
        <h1>ScreenVoice</h1>
      </div>
      <p class="subtitle">Voice, chat & screen sharing — no server needed</p>
      <div class="form-group">
        <label>Your name</label>
        <input type="text" id="usernameInput" placeholder="Enter your name..." autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Room</label>
        <div class="room-input">
          <input type="text" id="roomId" placeholder="Room name..." autocomplete="off" />
          <button id="joinBtn">Join</button>
        </div>
      </div>
      <p class="hint">Create a room, share the link, friends connect directly</p>
      <div class="invite-box" id="inviteBox" style="display:none">
        <label>Invite link</label>
        <div class="invite-link-row">
          <input type="text" id="inviteLink" readonly />
          <button id="copyBtn">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <div id="room" style="display:none">
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="server-icon">SV</div>
      </div>
      <div class="channel-list">
        <div class="channel active">
          <span class="hash">#</span> <span id="sidebarRoomName">general</span>
        </div>
        <div class="channel" id="voiceChannel">
          <span class="hash">#</span> voice
        </div>
      </div>
      <div class="user-list" id="userList">
        <div class="user-list-header">Online — <span id="userCount">1</span></div>
        <div class="user-item" id="selfUserItem">
          <div class="avatar" id="avatarText">U</div>
          <span id="usernameDisplay">You</span>
        </div>
      </div>
      <div class="user-info">
        <div class="avatar" id="avatarTextBottom">U</div>
        <span id="usernameDisplayBottom">User</span>
      </div>
    </div>

    <div class="main">
      <div class="header">
        <span class="room-tag">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span id="roomName">general</span>
        </span>
        <span class="connection-status" id="connectionStatus">Connected</span>
      </div>

      <div class="content-area">
        <div class="video-grid" id="videoGrid">
          <div class="video-container" id="selfContainer">
            <video id="selfVideo" autoplay muted playsinline></video>
            <div class="video-label">
              <span id="selfName">You</span>
              <span class="mic-icon" id="selfMicIcon">&#x1f50a;</span>
            </div>
          </div>
        </div>

        <div class="chat-panel" id="chatPanel">
          <div class="chat-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Text Chat
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="chat-welcome">Chat messages appear here</div>
          </div>
          <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Message..." autocomplete="off" />
            <button id="chatSendBtn">Send</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="micBtn" title="Toggle Mic">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="camBtn" title="Toggle Camera">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 7l-7 5 7 5V7z"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="screenBtn" title="Share Screen">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
        <button class="ctrl-btn danger" id="leaveBtn" title="Leave Room">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 17l5-5-5-5M19 12H9"/>
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="debugLog" style="display:none; position:fixed; bottom:0; left:0; right:0; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.9); color:#0f0; font:12px monospace; padding:8px; z-index:999; white-space:pre-wrap;"></div>
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
